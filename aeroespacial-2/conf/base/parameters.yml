data_ingestion:
  # Path to the directory where each subdirectory is one flight recording
  raw_data_dir: "aeroespacial-2/data/01_raw/processed"
  # Raw IMU topic to discard in favor of the processed/filtered IMU
  imu_source_to_discard: "imu-data_raw"
  # Only load flights whose directory name contains at least one of these keywords.
  # Set to null to load all flights.
  flight_keywords:
    - "engine_failure"
    - "no_failure"

fft_ingestion:
  # Path to the directory where each subdirectory is one flight recording
  raw_data_dir: "aeroespacial-2/data/01_raw/processed"
  # Raw IMU topic to discard in favor of the processed/filtered IMU
  imu_source_to_discard: "imu-data_raw"
  # Only load flights whose directory name contains at least one of these keywords.
  # Set to null to load all flights.
  flight_keywords:
    - "engine_failure"
    - "no_failure"
  # Substring patterns to match in ROS column names for FFT feature selection.
  # A column is kept if its name contains ANY of these patterns.
  # Signals with a direct physical link to motor rotation frequency are included,
  # plus altitude as the single time-domain exception (monotonic decline at failure).
  fft_relevant_patterns:
    - "imu-data_field.linear_acceleration" # IMU accel x/y/z — motor vibration
    - "mag_field.magnetic"                # Magnetometer x/y/z — motor EM field
    - "airspeed_field.measured"           # Airspeed — thrust ripple oscillations
    - "failure_status"                    # Motor failure label (always keep)

data_preparation:
  # Remove the first N seconds of each flight (sensor initialization artifacts)
  cut_seconds: 1.0
  # Columns with std ≤ this threshold are removed (null or near-null variation).
  # Use 0.0 to drop only truly constant columns.
  # Increase (e.g. 0.01) to also discard near-constant signals.
  min_std_threshold: 0.0001
  # Seconds of stable cruise data used to estimate the per-flight magnetometer
  # calibration baseline (mag_x/y/z offset). The mean of this initial window is
  # subtracted from the entire flight, making the model invariant to session-to-
  # session calibration drift. Set to 0.0 to disable detrending.
  detrend_seconds: 2.0

fft_data_preparation:
  cut_seconds: 1.0
  min_std_threshold: 0.0001
  detrend_seconds: 2.0

feature_engineering:
  # Rolling window sizes in samples.
  # At ~100 Hz sampling: 50 = 0.5 s, 100 = 1 s, 200 = 2 s.
  # Smaller windows react faster but are noisier; larger windows are smoother but slower.
  rolling_windows: [50, 100, 200]
  # Window sizes in samples for FFT spectral features (peak power, entropy, high-freq ratio).
  # At ~523 Hz sampling, engine-failure precursors appear at 0.1–2 Hz — requiring windows
  # of at least ~500 samples. Small windows (50–200) only capture high-frequency noise.
  # 500 ≈ 1 s  |  1000 ≈ 2 s  |  2000 ≈ 4 s
  fft_windows: [500, 1000, 2000]

fft_feature_engineering:
  # Rolling window sizes in samples.
  # FFT data sampling: ~200 Hz average (merged ROS topics after merge_asof).
  # 50 ≈ 0.25 s  |  100 ≈ 0.5 s  |  200 ≈ 1 s
  rolling_windows: [50, 100, 200]
  # Window sizes in samples for FFT spectral features (peak power, entropy, high-freq ratio).
  # Smaller windows (100/200) react in 0.5–1 s, capturing fault onset quickly.
  # Larger window (500 ≈ 2.5 s) retains spectral resolution for lower-frequency components.
  # 100 ≈ 0.5 s  |  200 ≈ 1 s  |  500 ≈ 2.5 s
  fft_windows: [100, 200, 500]

fft_model_training:
  # Number of timesteps per sliding window.
  # At ~200 Hz FFT sampling, 20 timesteps = 0.1 seconds of temporal context.
  window_size: 20
  # Fraction of the dataset the Isolation Forest assumes are anomalies.
  # Raised to 0.05 after removing alt_global: spectral-only features have lower
  # Cohen's d, so a higher contamination threshold improves recall.
  contamination: 0.01 #0.01 0.001
  # Number of isolation trees.
  n_estimators: 100 #150
  max_samples: 128
  max_features: 0.5 #1.0 0.5
  # Number of top features selected via Cohen's d effect size
  n_top_features: 20
  # Fraction of no_failure flights used for training (chronologically first).
  # The remaining no_failure flights plus all failure flights form the test set.
  train_ratio: 0.7
  target_col: "target_fault"
  timestamp_col: "timestamp"
  # Seconds to skip from the start of each flight before building windows.
  skip_seconds: 20.0

model_training:
  # Number of timesteps per sliding window.
  # At ~100 Hz sampling, 20 timesteps = 0.2 seconds of temporal context.
  window_size: 20
  # Fraction of the dataset the Isolation Forest assumes are anomalies.
  # "auto" uses the theoretical threshold from the original IF paper (-0.5),
  # correct for novelty detection where training data is 100% normal.
  # A float value (e.g. 0.03) assumes that fraction of training data is
  # anomalous — incorrect here since we train exclusively on no_failure flights.
  contamination: 0.03 #"auto" 0.01
  # Number of isolation trees. More = more stable, slower to train.
  n_estimators: 100

  max_samples: 128
  max_features: 1.0 #0.5 
  # Number of top features selected via Cohen's d effect size
  n_top_features: 20
  # Fraction of no_failure flights used for training (chronologically first).
  # The remaining no_failure flights plus all failure flights form the test set.
  train_ratio: 0.7
  target_col: "target_fault"
  timestamp_col: "timestamp"
  # Seconds to skip from the start of each flight before building windows.
  # Recordings begin mid-flight with the aircraft descending from above-cruise
  # altitude (~50–95 m) to its cruise setpoint (~50 m). During this descent,
  # energy and altitude take the same values as during a motor failure, causing
  # false alarms. The transition takes up to 14 s across all flights; 15 s
  # provides a safe margin.
  skip_seconds: 20.0
  # Minimum number of consecutive anomalous windows required to trigger an alert.
  # Isolated anomalous windows occur by chance (~contamination % of the time) even
  # in normal flights. Requiring persistence eliminates these spurious alarms:
  # a real motor failure produces a sustained anomalous sequence, not a single spike.
  # At ~100 Hz with window_size=20, each window = 0.2 s → 10 windows ≈ 2 s.
  min_consecutive_windows: 50
